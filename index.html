<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Keuangan Fian</title>
<meta name="theme-color" content="#14121A" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0A090D; overscroll-behavior: none; }
  body { font-family: 'Manrope', sans-serif; }
  #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: stretch; }
  .phone { width: 100%; max-width: 480px; height: 100%; background: #14121A; position: relative; overflow: hidden; display: flex; flex-direction: column; margin: 0 auto; }
  .scroll::-webkit-scrollbar { width: 4px; }
  .scroll::-webkit-scrollbar-thumb { background: #3A3446; border-radius: 4px; }
  button { font-family: inherit; }
  .header { padding: calc(env(safe-area-inset-top) + 18px) 20px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #211E29; flex-shrink: 0; }
  .eyebrow { font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: #8A8496; font-weight: 600; }
  .header-title { font-family: 'Fraunces', serif; font-size: 22px; color: #F0EDE6; margin-top: 2px; font-weight: 500; }
  .wallet-badge { width: 38px; height: 38px; border-radius: 12px; background: rgba(201,162,75,0.12); border: 1px solid rgba(201,162,75,0.3); display: flex; align-items: center; justify-content: center; }
  .body { flex: 1; overflow-y: auto; padding: 18px 18px calc(env(safe-area-inset-bottom) + 100px); }
  .balance-card { background: linear-gradient(155deg, #211E2C 0%, #1A1722 100%); border: 1px solid #2E2938; border-radius: 20px; padding: 20px 20px 18px; }
  .balance-label { font-size: 11.5px; color: #9C93A8; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; }
  .balance-value { font-family: 'Fraunces', serif; font-size: 32px; color: #F0EDE6; margin-top: 6px; font-weight: 500; letter-spacing: -.01em; }
  .gold-rule { height: 2px; width: 44px; background: linear-gradient(90deg, #C9A24B, transparent); margin-top: 12px; border-radius: 2px; }
  .stat-row { display: flex; gap: 10px; margin-top: 14px; }
  .stat-chip { flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 14px; background: #1A1722; border: 1px solid; }
  .stat-chip-label { font-size: 10px; color: #8A8496; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .stat-chip-value { font-size: 12.5px; font-weight: 700; margin-top: 2px; }
  .month-switcher { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 18px 0 14px; }
  .month-arrow { width: 26px; height: 26px; border-radius: 8px; background: #1E1B26; border: 1px solid #2A2634; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .month-label { font-size: 12.5px; font-weight: 700; color: #F0EDE6; min-width: 130px; text-align: center; }
  .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .section-title { font-family: 'Fraunces', serif; font-size: 15.5px; color: #F0EDE6; font-weight: 500; }
  .sub-label { font-size: 12px; color: #8A8496; margin-top: 2px; margin-bottom: 16px; }
  .link-btn { font-size: 11.5px; color: #C9A24B; font-weight: 700; background: none; border: none; cursor: pointer; }
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-row { display: flex; align-items: center; gap: 12px; background: #1A1722; border: 1px solid #232030; border-radius: 14px; padding: 10px 12px; }
  .tx-icon { width: 36px; height: 36px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .tx-cat { font-size: 13px; color: #F0EDE6; font-weight: 600; }
  .tx-note { font-size: 11px; color: #8A8496; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tx-amount { font-size: 12.5px; font-weight: 700; white-space: nowrap; }
  .delete-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; opacity: .6; }
  .date-group-label { font-size: 11px; color: #6B6478; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
  .empty-state { text-align: center; color: #8A8496; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 36px 20px; }
  .empty-state.small { padding: 20px 10px; }
  .empty-dot { width: 8px; height: 8px; border-radius: 999px; background: #C9A24B; opacity: .5; }
  .empty-text { font-size: 12.5px; max-width: 220px; line-height: 1.5; }
  .chart-card { background: #1A1722; border: 1px solid #232030; border-radius: 16px; padding: 16px 14px; margin-bottom: 14px; }
  .chart-title { font-size: 13px; font-weight: 700; color: #F0EDE6; margin-bottom: 10px; }
  .legend-wrap { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; flex-shrink: 0; }
  .legend-text { color: #B8B0C4; flex: 1; }
  .legend-value { color: #F0EDE6; font-weight: 700; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding-top: 10px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
  .bar-pair { display: flex; align-items: flex-end; gap: 3px; height: 100%; width: 100%; justify-content: center; }
  .bar { width: 9px; border-radius: 3px 3px 0 0; min-height: 2px; }
  .bar-month-label { font-size: 9.5px; color: #8A8496; margin-top: 4px; font-weight: 600; }
  .bar-legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 4px; }
  .bar-legend-item { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: #B8B0C4; }
  .fab { position: absolute; right: 18px; bottom: calc(env(safe-area-inset-bottom) + 78px); width: 54px; height: 54px; border-radius: 17px; background: linear-gradient(155deg, #E0B968, #C9A24B); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 24px -6px rgba(201,162,75,0.55); font-size: 26px; color: #14121A; font-weight: 700; }
  .fab:active { transform: scale(0.94); }
  .bottom-nav { flex-shrink: 0; display: flex; border-top: 1px solid #211E29; background: #17141D; padding: 8px 0 calc(env(safe-area-inset-bottom) + 12px); }
  .nav-btn { flex: 1; background: none; border: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 4px 0; color: #8A8496; gap: 3px; }
  .nav-btn.active { color: #C9A24B; }
  .nav-btn svg { width: 20px; height: 20px; }
  .nav-btn span { font-size: 10.5px; font-weight: 500; }
  .nav-btn.active span { font-weight: 700; }
  .overlay { position: absolute; inset: 0; background: rgba(10,9,13,0.6); display: flex; align-items: flex-end; z-index: 10; animation: fadeIn .2s ease; }
  .sheet { width: 100%; max-height: 88%; background: #17141D; border-top-left-radius: 24px; border-top-right-radius: 24px; border: 1px solid #2A2634; border-bottom: none; padding: 10px 20px calc(env(safe-area-inset-bottom) + 24px); overflow-y: auto; animation: slideUp .28s cubic-bezier(.16,1,.3,1); }
  .sheet-handle { width: 36px; height: 4px; border-radius: 4px; background: #3A3446; margin: 6px auto 14px; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .sheet-title { font-family: 'Fraunces', serif; font-size: 18px; color: #F0EDE6; font-weight: 500; }
  .close-btn { background: #1E1B26; border: 1px solid #2A2634; border-radius: 10px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8A8496; font-size: 16px; }
  .type-toggle { display: flex; background: #1E1B26; border: 1px solid #2A2634; border-radius: 12px; padding: 3px; margin-bottom: 18px; }
  .type-toggle-btn { flex: 1; background: none; border: none; padding: 9px 0; border-radius: 9px; font-size: 12.5px; font-weight: 700; color: #8A8496; cursor: pointer; }
  .type-toggle-btn.active-exp { background: rgba(193,102,107,0.18); color: #D98A8E; }
  .type-toggle-btn.active-inc { background: rgba(111,162,135,0.18); color: #8FC1A6; }
  .field-label { font-size: 11px; color: #8A8496; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; margin-top: 16px; }
  .amount-input-wrap { display: flex; align-items: center; gap: 8px; background: #1E1B26; border: 1px solid #2A2634; border-radius: 14px; padding: 12px 16px; }
  .amount-prefix { font-size: 16px; color: #C9A24B; font-weight: 700; }
  .amount-input { flex: 1; background: none; border: none; outline: none; font-size: 20px; color: #F0EDE6; font-family: 'Fraunces', serif; font-weight: 500; width: 100%; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 4px; border-radius: 13px; border: 1px solid #2A2634; cursor: pointer; background: #1E1B26; }
  .cat-btn:active { transform: scale(0.96); }
  .cat-btn .icon { font-size: 17px; }
  .cat-btn-text { font-size: 10px; font-weight: 600; text-align: center; color: #9C93A8; }
  .text-input { width: 100%; background: #1E1B26; border: 1px solid #2A2634; border-radius: 12px; padding: 11px 14px; font-size: 13px; color: #F0EDE6; outline: none; font-family: 'Manrope', sans-serif; }
  .save-btn { width: 100%; margin-top: 24px; padding: 15px 0; border-radius: 14px; border: none; background: linear-gradient(155deg, #E0B968, #C9A24B); color: #14121A; font-size: 14px; font-weight: 800; cursor: pointer; }
  .save-btn:disabled { opacity: .5; }
  .toast { position: absolute; left: 50%; bottom: 80px; transform: translateX(-50%); background: #211E2C; border: 1px solid #3A3446; color: #F0EDE6; font-size: 12.5px; font-weight: 600; padding: 10px 18px; border-radius: 999px; box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5); z-index: 20; white-space: nowrap; animation: toastIn .25s ease; }
  @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toastIn { from { transform: translate(-50%, 12px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
